x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  image: job-intelligent-airflow:latest
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_AIRFLOW_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/logs:/opt/airflow/logs
    - ./bronze:/app/bronze
    - ./silver:/app/silver
    - ./gold:/app/gold
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - job_network
  restart: unless-stopped

services:

  # ── Infrastructure ────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: ji_postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_AIRFLOW_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./storage/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5
    networks:
      - job_network
    restart: unless-stopped
  
  # ----------------------------------------------
  # Redis
  # ----------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ji_redis

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

    restart: unless-stopped

    networks:
      - job_network

  minio:
    image: minio/minio:latest
    container_name: ji_minio
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      retries: 5
    networks:
      - job_network
    restart: unless-stopped

  # ── Airflow ───────────────────────────────

  airflow-init:
    <<: *airflow-common
    container_name: ji_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db upgrade
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname Admin \
          --lastname Admin \
          --role Admin \
          --email admin@job-intelligent.local
    restart: on-failure

  airflow-webserver:
   <<: *airflow-common
   container_name: ji_airflow_webserver
   entrypoint: airflow
   command: webserver
   ports:
    - "8080:8080"
   depends_on:
     airflow-init:
      condition: service_completed_successfully
   healthcheck:
     test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
     interval: 30s
     retries: 5

  airflow-scheduler:
    <<: *airflow-common
    container_name: ji_airflow_scheduler
    entrypoint: airflow
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Pipeline ──────────────────────────────

  bronze:
    build:
      context: .
      dockerfile: Dockerfile
    image: job-intelligent-bronze:latest
    container_name: ji_bronze
    env_file: .env
    command: python bronze/entrypoint.py --source all
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - job_network
    restart: "no"

  silver:
    build:
      context: .
      dockerfile: Dockerfile
    image: job-intelligent-silver:latest
    container_name: ji_silver
    env_file: .env
    command: python silver/entrypoint.py --step all
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - job_network
    restart: "no"

  gold:
    build:
      context: .
      dockerfile: Dockerfile
    image: job-intelligent-gold:latest
    container_name: ji_gold
    env_file: .env
    command: python gold/entrypoint.py --step all
    depends_on:
      postgres:
        condition: service_healthy
      nlp_service:
        condition: service_started
    networks:
      - job_network
    restart: "no"

  nlp_service:
    build:
      context: .
      dockerfile: Dockerfile
    image: job-intelligent-nlp:latest
    container_name: ji_nlp_service
    env_file: .env
    command: uvicorn nlp_service.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    networks:
      - job_network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: job-intelligent-api:latest
    container_name: ji_api
    env_file: .env
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - nlp_service
    networks:
      - job_network
    restart: unless-stopped

# ─────────────────────────────────────────────
#  Volumes & Network
# ─────────────────────────────────────────────
volumes:
  postgres_data:
  minio_data:

networks:
  job_network:
    name: job_intelligent_network
    driver: bridge